# ── mise — user-global defaults ──────────────────────────────────────
# Per-project tool pins belong in each repo's own mise.toml; this is the
# global fallback for ad-hoc shells.
#
# Install the current tools from this file with:   mise install

[tools]
# Uncomment and pin what you use daily:

[settings]
# Speed: parallel installs, cache aggressively, don't ask about updates
jobs                    = 8
verbose                 = false
experimental            = true
always_keep_download    = false
always_keep_install     = false
asdf_compat             = true
quiet                   = false

missing_runtime_behavior = "autoinstall"

# Trust project mise.toml files automatically (only those you've seen)
trusted_config_paths = [
  "~/work",
  "~/dev",
]

[env]
# Make mise shims win on PATH without you having to think about it
MISE_SHIMS_DIR = "~/.local/share/mise/shims"
