# ──────────────────────────────────────────────────────────────────────
#  Starship prompt — dev-focused, shows runtime context only in projects
#  Docs: https://starship.rs/config/
# ──────────────────────────────────────────────────────────────────────

add_newline = true
command_timeout = 1000

format = """
[┌](bold fg:#4a9d6a) $username$hostname$directory$git_branch$git_status$git_state$cmd_duration
[└](bold fg:#4a9d6a)$character"""

[character]
success_symbol = "[➜](bold fg:#52b569)"
error_symbol   = "[✘](bold red)"
vicmd_symbol   = "[❮](bold yellow)"

[username]
style_user   = "bold fg:#96c7b2"
style_root   = "bold red"
format       = "[$user]($style)"
show_always  = false

[hostname]
ssh_only     = true
format       = "[@$hostname](fg:#b3daa9) "

[directory]
style                = "bold fg:#c2b59b"
truncation_length    = 4
truncation_symbol    = "…/"
truncate_to_repo     = true
read_only            = " 🔒"

[git_branch]
format = "[\\[$branch\\]]($style) "
style  = "bold fg:#52b569"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style  = "fg:#f9f3ba"
ahead     = "⇡${count} "
behind    = "⇣${count} "
diverged  = "⇕⇡${ahead_count}⇣${behind_count} "
conflicted= "="
untracked = "?${count} "
modified  = "!${count} "
staged    = "+${count} "
renamed   = "»${count} "
deleted   = "✘${count} "
stashed   = '≡ '

[cmd_duration]
min_time = 2000
format   = "[took $duration](fg:#7a7567) "

# ── Runtime context: shown ONLY in detected project dirs ───────────
[java]
format = "[☕ ](bold fg:#f9f3ba) "
detect_extensions = ["java", "class", "jar"]
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", "settings.gradle", "mise.toml"]

[nodejs]
format = "[⬢ ](bold fg:#96c7b2) "
detect_files = ["package.json", ".nvmrc", "mise.toml"]

[python]
format = "[🐍 ](bold fg:#b3daa9) "
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", "mise.toml"]

[golang]
format = "[🐹 ](bold fg:#96c7b2) "

[rust]
format = "[🦀 ](bold fg:#c2b59b) "

[aws]
format = "[☁ $profile($region)](bold fg:#f9f3ba) "
disabled = false

# ── Disable sections we don't need ──────────────────────────────────
[package]
disabled = true
[docker_context]
disabled = true
[battery]
disabled = true
